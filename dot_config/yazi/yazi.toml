[plugins]
preload = [
  # "~/.config/yazi/ui.lua"
]

[mgr]
folder_offset = [2,0,2,0]
linemode = "size_and_mtime"
preview_offset = [2,1,2,1]
ratio = [2, 3, 3]
scrolloff = 8
show_hidden = true
show_symlink = true
sort_by = 'natural'
sort_dir_first = true
sort_reverse = false
sort_sensitive = false

[opener]
tw = [
{ run = "tw %s", block = true, desc = "Open CSV" }
]

[open]
rules = [
  { url = "*.csv", use = "tw" },
]

[[plugin.deps]]
id   = "git"
name = "*"
run  = "git"

[[plugin.deps]]
id   = "git"
name = "*/"
run  = "git"
